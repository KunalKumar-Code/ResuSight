version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resusight-web
    restart: always
    expose:
      - "8000"
    environment:
      - DATABASE_DIR=/app/db
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - db_volume:/app/db

  nginx:
    image: nginx:alpine
    container_name: resusight-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  static_volume:
  db_volume:
